<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目标列表 - TaskPixel</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body class="bg-background font-body text-text-primary">
    <!-- 导航栏 -->
    <header
        class="flex items-center justify-between whitespace-nowrap border-b-4 border-pixel-border-color px-6 py-4 bg-white">
        <div class="flex items-center gap-4">
            <svg class="text-pixel-text-color" fill="none" height="32" viewBox="0 0 32 32" width="32"
                xmlns="http://www.w3.org/2000/svg">
                <path clip-rule="evenodd"
                    d="M0 0H8V8H0V0ZM8 8H16V16H8V8ZM16 16H24V24H16V16ZM0 16H8V24H0V16ZM8 24H16V32H8V24ZM16 0H24V8H16V0ZM24 8H32V16H24V8Z"
                    fill="currentColor" fill-rule="evenodd"></path>
            </svg>
            <h2 class="text-xl font-bold text-pixel-text-color">TaskPixel</h2>
        </div>
        <div class="hidden md:flex items-center gap-8 text-sm">
            <a class="text-black/70 hover:text-primary nav-link" href="index.html">主页</a>
            <a class="text-black/70 hover:text-primary nav-link" href="#">日历</a>
            <a class="font-bold text-pixel-text-color nav-link active" href="goals.html">目标</a>
            <a class="text-black/70 hover:text-primary nav-link" href="settings.html">设置</a>
        </div>
        <div class="flex items-center gap-4">
            <button
                class="size-10 flex items-center justify-center border-4 border-pixel-border-color bg-pixel-accent pixel-button"
                aria-label="通知">
                <svg class="text-pixel-text-color" fill="currentColor" height="20px" viewBox="0 0 256 256" width="20px"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M221.8,175.94C216.25,166.38,208,139.33,208,104a80,80,0,1,0-160,0c0,35.34-8.26,62.38-13.81,71.94A16,16,0,0,0,48,200H88.81a40,40,0,0,0,78.38,0H208a16,16,0,0,0,13.8-24.06ZM128,216a24,24,0,0,1-22.62-16h45.24A24,24,0,0,1,128,216ZM48,184c7.7-13.24,16-43.92,16-80a64,64,0,1,1,128,0c0,36.05,8.28,66.73,16,80Z">
                    </path>
                </svg>
            </button>
            <div class="bg-center bg-no-repeat aspect-square bg-cover size-10 border-4 border-black user-avatar">
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-display">所有目标</h2>
            <div class="flex gap-4">
                <button id="ai-priority-button"
                    class="pixel-button bg-primary text-white font-display py-2 px-4 text-sm flex items-center">
                    <span class="material-symbols-outlined text-base mr-1">auto_awesome</span>
                    优先级评估
                </button>
            </div>
        </div>

        <!-- 标签筛选 -->
        <div class="border-4 border-border-color p-4 mb-6 bg-white">
            <h3 class="font-display text-xl mb-3">标签筛选</h3>
            <div id="tags-container" class="flex flex-wrap gap-2 mb-3">
                <!-- 标签将动态插入 -->
            </div>
            <div class="flex gap-2">
                <button id="clear-tags-button" class="pixel-button text-sm">清除筛选</button>
            </div>
        </div>

        <!-- 排序选项 -->
        <div class="flex justify-end mb-4">
            <select id="sort-select" class="pixel-border p-2" title="排序选项" aria-label="排序选项">
                <option value="priority">按优先级排序</option>
                <option value="alpha">按字母排序</option>
                <option value="task">按任务分组</option>
            </select>
        </div>

        <!-- 目标列表 -->
        <div id="goals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 目标将动态插入 -->
        </div>

        <!-- 无目标状态 -->
        <div id="empty-goals" class="hidden text-center p-12 border-4 border-dashed border-gray-300 bg-gray-50">
            <p class="text-lg text-gray-500 mb-4">没有找到匹配的目标</p>
        </div>
    </main>

    <!-- 优先级评估对话框 -->
    <div id="priority-evaluation-dialog"
        class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
        <div class="pixel-border bg-white p-6 w-full max-w-md">
            <h2 class="text-2xl font-display mb-6">选择要评估的目标</h2>
            <div id="goal-selection-container" class="max-h-96 overflow-y-auto mb-6">
                <!-- 选择目标将动态插入 -->
            </div>
            <div class="flex justify-end gap-4">
                <button id="cancel-priority-evaluation" class="pixel-button">取消</button>
                <button id="start-priority-evaluation" class="pixel-button bg-primary text-white">开始评估</button>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/aiAssist.js"></script>
    <script src="js/goals.js"></script>
</body>

</html>
