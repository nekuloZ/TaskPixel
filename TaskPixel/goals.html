<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目标列表 - TaskPixel</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="bg-background font-body text-text-primary">
    <!-- 导航栏 -->
    <header class="border-b-4 border-border-color">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center">
                <h1 class="font-display text-2xl mr-8">TaskPixel</h1>
                <nav class="hidden sm:flex space-x-6">
                    <a href="index.html" class="font-medium">首页</a>
                    <a href="goals.html" class="font-medium text-primary">目标</a>
                    <a href="settings.html" class="font-medium">设置</a>
                </nav>
            </div>
            <div class="flex items-center">
                <a href="settings.html" class="text-gray-600 hover:text-gray-900">
                    <span class="material-symbols-outlined">settings</span>
                </a>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-display">所有目标</h2>
            <div class="flex gap-4">
                <button id="ai-priority-button" class="pixel-button bg-primary text-white font-display py-2 px-4 text-sm flex items-center">
                    <span class="material-symbols-outlined text-base mr-1">auto_awesome</span>
                    优先级评估
                </button>
            </div>
        </div>

        <!-- 标签筛选 -->
        <div class="border-4 border-border-color p-4 mb-6 bg-white">
            <h3 class="font-display text-xl mb-3">标签筛选</h3>
            <div id="tags-container" class="flex flex-wrap gap-2 mb-3">
                <!-- 标签将动态插入 -->
            </div>
            <div class="flex gap-2">
                <button id="clear-tags-button" class="pixel-button text-sm">清除筛选</button>
            </div>
        </div>

        <!-- 排序选项 -->
        <div class="flex justify-end mb-4">
            <select id="sort-select" class="pixel-border p-2">
                <option value="priority">按优先级排序</option>
                <option value="alpha">按字母排序</option>
                <option value="task">按任务分组</option>
            </select>
        </div>

        <!-- 目标列表 -->
        <div id="goals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 目标将动态插入 -->
        </div>

        <!-- 无目标状态 -->
        <div id="empty-goals" class="hidden text-center p-12 border-4 border-dashed border-gray-300 bg-gray-50">
            <p class="text-lg text-gray-500 mb-4">没有找到匹配的目标</p>
        </div>
    </main>

    <!-- 优先级评估对话框 -->
    <div id="priority-evaluation-dialog" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
        <div class="pixel-border bg-white p-6 w-full max-w-md">
            <h2 class="text-2xl font-display mb-6">选择要评估的目标</h2>
            <div id="goal-selection-container" class="max-h-96 overflow-y-auto mb-6">
                <!-- 选择目标将动态插入 -->
            </div>
            <div class="flex justify-end gap-4">
                <button id="cancel-priority-evaluation" class="pixel-button">取消</button>
                <button id="start-priority-evaluation" class="pixel-button bg-primary text-white">开始评估</button>
            </div>
        </div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/aiAssist.js"></script>
    <script src="js/goals.js"></script>
</body>
</html>
