<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PixelTask Settings</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=VT323&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
        @layer base {
            select {
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23000000' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
                background-position: right 0.5rem center;
                background-repeat: no-repeat;
                background-size: 1.5em 1.5em;
                padding-right: 2.5rem;
                -webkit-print-color-adjust: exact;
                color-adjust: exact;
                border-width: 2px;
            }
        }
        @layer utilities {
            .pixel-box {
                box-shadow: 
                    inset -2px -2px 0px 0px #000000,
                    inset 2px 2px 0px 0px #FFFFFF;
            }
            .pixel-box-sm {
                box-shadow: 
                    inset -1px -1px 0px 0px #000000,
                    inset 1px 1px 0px 0px #FFFFFF;
            }
            .pixel-border {
                border: 2px solid #000000;
            }
            .pixel-button {
                background-color: #c0c0c0;
                border: 2px solid #000000;
                box-shadow: inset -2px -2px 0px 0px #000000, inset 2px 2px 0px 0px #FFFFFF;
                color: #000000;
            }
            .pixel-button:active {
                box-shadow: inset 2px 2px 0px 0px #000000, inset -2px -2px 0px 0px #FFFFFF;
            }
            .pixel-button-primary {
                 background-color: #8E44AD;
                 color: white;
            }
             .pixel-button-danger {
                 background-color: #E74C3C;
                 color: white;
            }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#8E44AD",
                        "background": "#F0F0F0",
                        "pixel-border-color": "#000000",
                        "pixel-bg-color": "#c0c0c0"
                    },
                    fontFamily: {
                        "display": ["Pixelify Sans", "sans-serif"],
                        "body": ["VT323", "monospace"],
                    },
                    borderRadius: {
                        "none": "0",
                    },
                    boxShadow: {
                        'pixel': '4px 4px 0px 0px #000000',
                        'pixel-inset': 'inset 2px 2px 0px 0px #000000, inset -2px -2px 0px 0px #FFFFFF'
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background font-body text-black">
<div class="flex flex-col min-h-screen">
<header class="flex items-center justify-between border-b-2 border-pixel-border-color px-4 py-2 bg-pixel-bg-color">
<div class="flex items-center gap-3">
<div class="w-8 h-8 text-primary">
<svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H12V12H4V4Z" fill="currentColor"></path>
<path d="M4 16H12V24H4V16Z" fill="currentColor"></path>
<path d="M16 4H24V12H16V4Z" fill="currentColor"></path>
<path d="M16 16H24V24H16V16Z" fill="currentColor"></path>
<path d="M28 4H36V12H28V4Z" fill="currentColor"></path>
<path d="M28 16H36V24H28V16Z" fill="currentColor"></path>
<path d="M40 4H44V44H40V4Z" fill="currentColor"></path>
<path d="M4 28H12V36H4V28Z" fill="currentColor"></path>
<path d="M16 28H24V36H16V28Z" fill="currentColor"></path>
<path d="M28 28H36V36H28V28Z" fill="currentColor"></path>
<path d="M4 40H36V44H4V40Z" fill="currentColor"></path>
</svg>
</div>
<h1 class="text-2xl font-display font-bold">PixelTask</h1>
</div>
<div class="flex items-center gap-4">
<button class="pixel-button p-2">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 0 2l-.15.08a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1 0-2l.15-.08a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>
</button>
<div class="w-10 h-10 bg-cover bg-center pixel-border" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC3ViMzabeSLcDxYfMGoT9w_Z75RFWwfsgjrKeFTa_W4GI5Bbg6N5IZuGR0zxeIZ-SzIVkmkiBAhLxYXNmQlAayKzcc6hkfeos1zhOLssdFDULKkk6GUg-WiwMIeXWRdLzgqTe1qiWsFiUTHcM1bWtK2KFhLI5piqXtuZWjuIbDrRWul8ERjiDFHrGZ6lNXhatPW8bwkVQE8KWfK60vnU_38AZBFb9nkfvQ7cd9OPcjz5za75FHiT6FeQiwf_xKWhYnLP32n0JNtSY");'></div>
</div>
</header>
<main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
<div class="max-w-2xl mx-auto bg-pixel-bg-color p-6 pixel-border shadow-pixel">
<h2 class="text-4xl font-display font-bold mb-6 text-center">Settings</h2>
<div class="space-y-8">
<section>
<h3 class="text-2xl font-display font-bold mb-4 border-b-2 border-black pb-2">Personal Information</h3>
<div class="space-y-4">
<div>
<label class="block text-lg font-bold mb-1" for="name">Name</label>
<input class="form-input w-full bg-white pixel-border focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" id="name" placeholder="Enter your name" type="text"/>
</div>
<div>
<label class="block text-lg font-bold mb-1" for="email">Email</label>
<input class="form-input w-full bg-white pixel-border focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" id="email" placeholder="Enter your email" type="email"/>
</div>
</div>
</section>
<section>
<h3 class="text-2xl font-display font-bold mb-4 border-b-2 border-black pb-2">App Preferences</h3>
<div class="space-y-4">
<div>
<label class="block text-lg font-bold mb-1" for="theme">Theme</label>
<select class="form-select w-full bg-white pixel-border focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" id="theme">
<option>Light Mode</option>
<option disabled="">Dark Mode (Coming Soon!)</option>
<option disabled="">System</option>
</select>
</div>
<div>
<label class="block text-lg font-bold mb-1" for="notifications">Notifications</label>
<div class="flex items-center gap-4 mt-2">
<label class="flex items-center text-lg">
<input checked="" class="form-radio h-5 w-5 text-primary bg-white pixel-border-sm focus:ring-primary" name="notifications" type="radio"/>
<span class="ml-2">All</span>
</label>
<label class="flex items-center text-lg">
<input class="form-radio h-5 w-5 text-primary bg-white pixel-border-sm focus:ring-primary" name="notifications" type="radio"/>
<span class="ml-2">Mentions</span>
</label>
<label class="flex items-center text-lg">
<input class="form-radio h-5 w-5 text-primary bg-white pixel-border-sm focus:ring-primary" name="notifications" type="radio"/>
<span class="ml-2">None</span>
</label>
</div>
</div>
</div>
</section>
<section>
<h3 class="text-2xl font-display font-bold mb-4 border-b-2 border-black pb-2">Account Management</h3>
<div class="flex flex-col sm:flex-row gap-4">
<button class="w-full sm:w-auto px-6 py-2 pixel-button pixel-button-primary text-lg font-bold">
                                Change Password
                            </button>
<button class="w-full sm:w-auto px-6 py-2 pixel-button pixel-button-danger text-lg font-bold">
                                Delete Account
                            </button>
</div>
</section>
</div>
</div>
</main>
<footer class="text-center py-4 text-sm text-gray-600 border-t-2 border-black bg-pixel-bg-color">
<p>© 2024 PixelTask. All rights reserved.</p>
</footer>
</div>

</body></html>
